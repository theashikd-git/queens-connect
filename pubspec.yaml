name: hospital_field_app
description: Hospital Field Marketing App for tracking sales executive visits.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # State Management
  provider: ^6.1.2

  # UI Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  lottie: ^3.1.3
  url_launcher: ^6.3.1

  # Utilities
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
